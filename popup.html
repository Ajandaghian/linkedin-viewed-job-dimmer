<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkedIn Viewed Job Dimmer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">LinkedIn jobs</p>
      <h1>Dim viewed jobs</h1>
      <p class="copy">
        Run this on the active LinkedIn jobs tab. It keeps cards whose footer says
        <strong>Viewed</strong>, but mutes them into a dark gray disabled style.
      </p>

      <button id="dimButton" class="primary-button" type="button">Dim viewed jobs</button>

      <div id="status" class="status" aria-live="polite">
        Open a LinkedIn jobs tab, then click the button above.
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
