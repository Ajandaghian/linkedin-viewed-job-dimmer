<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkedIn Viewed Job Remover</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">LinkedIn jobs</p>
      <h1>Job tools</h1>
      <p class="copy">
        Run this on the active LinkedIn jobs tab. Remove cards whose footer says
        <strong>Viewed</strong>, or scan job pages and add a flag beside each title for
        the language you are likely to open.
      </p>

      <div class="actions">
        <button id="cleanButton" class="primary-button" type="button">Remove viewed jobs</button>
        <button id="languageButton" class="secondary-button" type="button">Detect language flags</button>
      </div>

      <div id="status" class="status" aria-live="polite">
        Open a LinkedIn jobs tab, then choose an action.
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
